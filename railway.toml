# Railway Deployment Configuration
# Defines web server and worker processes for NexusMeme

[build]
# Use Nixpacks (default) since no Dockerfile is present
builder = "NIXPACKS"
[build.env]
# Add system packages needed for sodium-native build
NIXPACKS_PKGS = "libtool autoconf automake pkg-config"

[[services]]
name = "web"
cmd = "pnpm start"

[[services]]
name = "worker"
cmd = "node dist/worker.js"

[services.worker.env]
NODE_ENV = "production"
IS_WORKER = "true"

[[crons]]
name = "billing-upcoming"
schedule = "0 9 28 * *"
cmd = "node scripts/run-cron.mjs billing-upcoming"

[[crons]]
name = "billing-monthly"
schedule = "0 2 1 * *"
cmd = "node scripts/run-cron.mjs billing-monthly"

[[crons]]
name = "billing-dunning"
schedule = "0 9 * * *"
cmd = "node scripts/run-cron.mjs billing-dunning"
