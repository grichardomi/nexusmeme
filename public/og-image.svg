<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Accent bar -->
  <rect x="100" y="200" width="8" height="230" fill="url(#accent)" rx="4"/>

  <!-- Main title -->
  <text x="140" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">NexusMeme</text>

  <!-- Gradient underline -->
  <rect x="140" y="300" width="520" height="4" fill="url(#accent)" rx="2"/>

  <!-- Subtitle -->
  <text x="140" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94a3b8">AI Crypto Trading Bot</text>

  <!-- Key message -->
  <text x="140" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#60a5fa">Pay only on profits — $0 on losses</text>

  <!-- Right side pill badges -->
  <rect x="780" y="220" width="320" height="56" fill="#1e40af22" rx="28" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="940" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#60a5fa" text-anchor="middle">Binance International</text>

  <rect x="780" y="296" width="320" height="56" fill="#7c3aed22" rx="28" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="940" y="331" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#a78bfa" text-anchor="middle">Available Globally</text>

  <rect x="780" y="372" width="320" height="56" fill="#06564022" rx="28" stroke="#10b981" stroke-width="1.5"/>
  <text x="940" y="407" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#34d399" text-anchor="middle">BTC &amp; ETH Trading</text>

  <!-- Bottom domain -->
  <text x="140" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#475569">nexusmeme.com</text>
</svg>
