<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1f2937" />
  <title>Offline — NexusMeme</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .card {
      max-width: 360px;
      width: 100%;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f8fafc;
    }
    p {
      font-size: 0.9375rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      min-height: 48px;
      line-height: 1;
      transition: background 0.15s;
    }
    .btn:hover { background: #2563eb; }
    .status {
      margin-top: 1.5rem;
      font-size: 0.8125rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>NexusMeme needs a connection to fetch live prices and trading data. Your bots are still running on our servers.</p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
    <p class="status" id="status">Waiting for connection...</p>
  </div>
  <script>
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = 'Connection restored — reloading...';
      setTimeout(() => window.location.reload(), 800);
    });
  </script>
</body>
</html>
